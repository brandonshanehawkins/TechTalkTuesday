<html lang="en"><head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>FRF Generator</title>
<style>
  :root {
    --bg:#000050; --panel:#151821; --panel2:#1b2030; --text:#e8eef6;
    --muted:#ffef2c; --brand:#4ea1ff; --accent:#8df0a9; --border:#2a3244;
  }
  body {margin:0;padding:24px;font-family:system-ui;background:#0b0c0f;color:var(--text);} 
  .wrap{max-width:700px;margin:auto;} 
  h1{margin:0;font-size:24px;color:var(--accent);} 
  .sub{color:var(--muted);font-size:14px;margin-top:6px;}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:20px;}
  .field{margin-bottom:16px;} 
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;}
  input,select,textarea{width:100%;background:#0f1320;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:15px;box-sizing:border-box;}
  textarea{min-height:80px;font-family:system-ui;resize:vertical;}
  select{cursor:pointer;} 
  .row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;} 
  .btn{padding:12px 18px;border-radius:8px;border:1px solid var(--border);background:#0f1524;color:var(--text);cursor:pointer;font-size:14px;font-weight:500;border:none;}
  .btn:hover{opacity:0.8;}
  .primary{background:linear-gradient(180deg,#4ea1ff,#2d7dd2);border:none;} 
  .secondary{background:linear-gradient(180deg,#8df0a9,#5bc97d);color:#000;}
  #status{font-size:13px;color:var(--accent);align-self:center;}
  .preview{background:#0a0b10;border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:20px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:400px;overflow-y:auto;display:none;}
  .preview.show{display:block;}
</style>
</head>

  <div class="field">

  </div>

  <div class="field">
    <label>Equipment Needs</label>

  </div>

  <div class="field">

  <div class="field">

  <div class="field">

  </div>

  <div class="row">
    <button type="button" class="btn primary" onclick="emailAndDownload()">📧 Email + Download</button>
    <button type="button" class="btn secondary" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
    <button type="button" class="btn" onclick="togglePreview()">👁️ Preview</button>
    <button type="button" class="btn" onclick="resetForm()">Reset</button>
    <span id="status"></span>

  <div class="preview" id="preview"></div>

// Update rate when freelancer selected
function updateRate() {
  var selectEl = document.getElementById('freelancerSelect');
  var rateEl = document.getElementById('rate');
  var selectedName = selectEl.value;
  
  if (selectedName && TEMPLATES[selectedName]) {
    rateEl.value = TEMPLATES[selectedName].rate;
  } else {
    rateEl.value = '';
  }

  // whenever the rate changes automatically recalc cost
  calculateEstimatedCost();
}

// count weekdays (Mon–Fri) inclusive between two dates
function countWeekdays(startDate, endDate) {
  if (!(startDate instanceof Date) || !(endDate instanceof Date)) return 0;
  var count = 0;
  var cur = new Date(startDate);
  // normalize time portion to avoid DST issues
  cur.setHours(0,0,0,0);
  endDate = new Date(endDate);
  endDate.setHours(0,0,0,0);
  while (cur <= endDate) {
    var day = cur.getDay();
    if (day !== 0 && day !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

// parse rate string to number; supports dollar signs and commas
function parseRate(rateStr) {
  if (!rateStr) return NaN;
  var num = parseFloat(rateStr.replace(/[^0-9.]/g, ''));
  return isNaN(num) ? NaN : num;
}

function calculateEstimatedCost() {
  var start = document.getElementById('startDate').value;
  var end = document.getElementById('endDate').value;
  var rateStr = document.getElementById('rate').value;
  if (!start || !end || !rateStr) return;

  var startDate = new Date(start);
  var endDate = new Date(end);
  if (isNaN(startDate) || isNaN(endDate)) return;

  var weekdays = countWeekdays(startDate, endDate);
  if (weekdays <= 0) return;

  var rate = parseRate(rateStr);
  if (isNaN(rate)) return;

  var cost;
  // if the rate string mentions "day" (but not "hour"), treat it as a daily rate
  if (/\bday\b/i.test(rateStr) && !/\bhour\b/i.test(rateStr)) {
    cost = weekdays * rate;
  } else {
    // assume hourly rate, with a 10‑hour workday
    cost = weekdays * 10 * rate;
  }

  document.getElementById('totalCost').value = '$' + cost.toFixed(2);
}

// attach listeners to recalc when dates or rate change
['startDate','endDate','rate'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('change', calculateEstimatedCost);
});


function val(id) {
  var el = document.getElementById(id);
  if (!el) return "";
  if (el.type === 'date' && el.value) {
    return new Date(el.value + "T00:00:00").toLocaleDateString();
  }
  return el.value.trim();
}

function buildFRF() {
  var selectedName = val('freelancerSelect');
  if (!selectedName) {
    alert('Please select a freelancer or vendor');
    return null;
  }

  var template = TEMPLATES[selectedName];
  var requestedBy = val('requestedBy');
  var maconomy = val('maconomy');
  var silentPartner = val('silentPartner');
  var account = val('account');
  var startDate = val('startDate');
  var endDate = val('endDate');
  var rate = val('rate');
  var totalCost = val('totalCost');
  var revAttached = val('revAttached');
  var equipmentNeeds = val('equipmentNeeds');
  var extensionOrNew = val('extensionOrNew');
  var reasonForHire = val('reasonForHire');
  var notes = val('notes');

  var frf = "Name: " + template.name + "\n";
  frf += "Email: " + template.email + "\n";
  frf += "Phone Number: " + template.phone + "\n";
  if (template.address) frf += "Address: " + template.address + "\n";
  frf += "Job Title: " + template.jobTitle + "\n\n";
  frf += "Hiring Manager: " + template.hiringManager + "\n\n";
  frf += "Requested by: " + requestedBy + "\n\n";
  frf += "Maconomy Number: " + (maconomy || 'N/A') + "\n";
  frf += "Silent Partner Number: " + silentPartner + "\n\n";
  frf += "Account/project: " + account + "\n\n";
  frf += "Location: " + template.location + "\n\n";
  frf += "Proposed start date: " + startDate + "\n\n";
  frf += "Estimated end date: " + endDate + "\n\n";
  frf += "Rate: " + rate + "\n\n";
  frf += "Estimated total cost: " + totalCost + "\n\n";
  frf += "Rev Attached: " + revAttached + "\n\n";
  frf += "Maconomy Secretary: " + template.macSecretary + "\n\n";
  frf += "Equipment Needs: " + equipmentNeeds + "\n\n";
  frf += "Extension or New Hire: " + extensionOrNew + "\n\n";
  frf += "Reason for hire: " + reasonForHire + "\n\n";
  frf += "Notes: " + notes + "\n";

  return frf;
}

function generateEmailBody(frf) {
  var requestedBy = val('requestedBy');
  var body = "Hi Finance Team,\n\n";
  body += "Please initiate this freelance request at your earliest convenience.\n\n";
  body += frf;
  if (requestedBy) {
    body += "\n\nThank you,\n" + requestedBy;
  }
  return body;
}

function getFileName() {
  var selectedName = val('freelancerSelect');
  var t = new Date();
  var month = t.getMonth() + 1;
  var day = t.getDate();
  var ds = t.getFullYear() + (month < 10 ? '0' : '') + month + (day < 10 ? '0' : '') + day;
  var n = (selectedName || "freelancer").toLowerCase().replace(/[^a-z0-9]+/g, "_");
  return ds + "_" + n + "_FRF.txt";
}

function downloadFile(name, content) {
  var blob = new Blob([content], {type: "text/plain"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}

function showStatus(msg) {
  var status = document.getElementById('status');
  if (status) {
    status.textContent = msg;
    setTimeout(function() { status.textContent = ''; }, 3000);
  }
}

function togglePreview() {
  var frf = buildFRF();
  if (!frf) return;
  var emailBody = generateEmailBody(frf);
  var preview = document.getElementById('preview');
  preview.textContent = emailBody;
  if (preview.classList.contains('show')) {
    preview.classList.remove('show');
  } else {
    preview.classList.add('show');
  }
}

function copyToClipboard() {
  var frf = buildFRF();
  if (!frf) return;
  var emailBody = generateEmailBody(frf);
  
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(emailBody).then(function() {
      showStatus('✓ Copied to clipboard!');
    }).catch(function(e) {
      showStatus('⚠️ Could not copy');
    });
  } else {
    var textArea = document.createElement("textarea");
    textArea.value = emailBody;
    textArea.style.position = 'fixed';
    textArea.style.top = '0';
    textArea.style.left = '0';
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
      showStatus('✓ Copied to clipboard!');
    } catch (err) {
      showStatus('⚠️ Could not copy');
    }
    document.body.removeChild(textArea);
  }
}

function emailAndDownload() {
  var frf = buildFRF();
  if (!frf) return;
  var emailBody = generateEmailBody(frf);
  var fileName = getFileName();
  downloadFile(fileName, emailBody);
  
  var selectedName = val('freelancerSelect');
  var subject = "Freelance Request - " + selectedName;
  window.location.href = "mailto:" + TO_EMAIL + "?cc=" + encodeURIComponent(CC_EMAILS) + "&subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(emailBody);
  showStatus('✓ Email opened & file downloaded!');
}

function resetForm() {
  document.getElementById('freelancerSelect').value = '';
  document.getElementById('requestedBy').value = '';
  document.getElementById('maconomy').value = '';
  document.getElementById('silentPartner').value = '';
  document.getElementById('account').value = '';
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  document.getElementById('rate').value = '';
  document.getElementById('totalCost').value = '';
  document.getElementById('revAttached').value = '';
  document.getElementById('equipmentNeeds').value = '';
  document.getElementById('extensionOrNew').value = '';
  document.getElementById('reasonForHire').value = '';
  document.getElementById('notes').value = '';
  var preview = document.getElementById('preview');
  if (preview.classList.contains('show')) {
    preview.classList.remove('show');
  }
}
</script>
